<title>Roman Numeral Converter</title>
<link rel="icon" type="image/x-icon" href="/official-site/favicon.ico">
<div class="css-3d-text">Roman Numeral Converter</div>
<a href="/official-site/sitemap.html">Roman Numeral Converter</a>
<p><strong>Note: Only accepts numbers under 3999.<strong></p>
<input type="number" id="numberInput" placeholder="Enter a number (1–3999)" style="font-size:20px; padding:5px;">
<button onclick="convertToRoman()" style="font-size:20px; padding:5px;">Convert</button>

<p id="result"></p>

<script>
function convertToRoman() {
  let num = parseInt(document.getElementById("numberInput").value);
  
  if (isNaN(num) || num < 1 || num > 3999) {
    document.getElementById("result").innerText = "Enter a number between 1 and 3999.";
    return;
  }

  const romanMap = [
    { value: 1000, symbol: "M" },
    { value: 900, symbol: "CM" },
    { value: 500, symbol: "D" },
    { value: 400, symbol: "CD" },
    { value: 100, symbol: "C" },
    { value: 90, symbol: "XC" },
    { value: 50, symbol: "L" },
    { value: 40, symbol: "XL" },
    { value: 10, symbol: "X" },
    { value: 9, symbol: "IX" },
    { value: 5, symbol: "V" },
    { value: 4, symbol: "IV" },
    { value: 1, symbol: "I" }
  ];

  let result = "";

  for (let i = 0; i < romanMap.length; i++) {
    while (num >= romanMap[i].value) {
      result += romanMap[i].symbol;
      num -= romanMap[i].value;
    }
  }

  document.getElementById("result").innerText = "Roman Numeral: " + result;
}
</script>
  <input type="text" id="romanInput" placeholder="Enter a Roman numeral (e.g. XIV)" style="font-size:20px; padding:5px;">
<button onclick="convertToNumber()" style="font-size:20px; padding:5px;">Convert</button>

<p id="result2"></p>

<script>
function convertToNumber() {
  let str = document.getElementById("romanInput").value.toUpperCase();

  if (!str.match(/^[IVXLCDM]+$/)) {
    document.getElementById("result2").innerText = "Enter a valid Roman numeral.";
    return;
  }

  const romanMap = {
    I: 1, V: 5, X: 10, L: 50,
    C: 100, D: 500, M: 1000
  };

  let total = 0;

  for (let i = 0; i < str.length; i++) {
    let current = romanMap[str[i]];
    let next = romanMap[str[i + 1]];

    if (next && current < next) {
      total += (next - current);
      i++; // skip next character
    } else {
      total += current;
    }
  }

  document.getElementById("result2").innerText = "Number: " + total;
}
</script>
